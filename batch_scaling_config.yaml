
dataset:
  name: "natural_questions"          
  source: "huggingface"              
  split: "validation"                       
  sample_queries: null                # null=使用所有queries，设置数字可采样
  random_seed: 2026

models:
  retrieval:
    name: "e5"
    model_path: "intfloat/e5-large-v2"
    max_length: 512
    batch_size: 512                   # 编码批大小独立于实验批大小
    use_fp16: true
    pooling_method: "mean"
    device: "cuda"

  generators:
    - name: "llama3-8B"
      model_path: "/data/home/mazhenxiang/.cache/modelscope/hub/Meta-Llama-3.1-8B-Instruct"
      max_input_len: 4096
      max_output_len: 128

    - name: "llama2-13B"
      model_path: "meta-llama/Llama-2-13b-hf"
      max_input_len: 4096
      max_output_len: 128

    - name: "opt-30B"
      model_path: "facebook/opt-30b"
      max_input_len: 2048
      max_output_len: 128


retrieval:
  index_path: "/data/home/mazhenxiang/Hedra-RAG-EXP/HedraRAG/data/index_0319/msacro/IVF4096/ivf.index"
  corpus_path: "Tevatron/msmarco-passage-corpus"
  index_type: "IVF4096"
  metric: "inner_product"


  nprobe_values: [128, 256, 512]


  topk: 1


  faiss_gpu: false                   


batch_size_scaling:

  batch_sizes: [8, 16, 32, 64, 128, 256, 512, 1024, 2048]


  max_batch_size: 2048


  default_max_batch_size: 512


rag:
  workflow_type: "one_shot"         


  query_prompt: "Answer the question: {query}"
  prompt_template: "Question: {query}\nContext: {context}\nAnswer:"


  generation:
    temperature: 0.0                  
    top_p: 1.0
    top_k: null


timing:
  # 是否执行独立warmup阶段
  skip_first_batch: true

  # 固定warmup query数量
  warmup_query_count: 32

  # 时间精度
  use_perf_counter: true

  # 是否记录详细的单个query时间
  detailed_query_timing: false


output:

  output_dir: "../output/batch_scaling_experiment"

  csv_filename: "results_{nprobe}_{llm_model}.csv"

  json_filename: "detailed_log_{nprobe}_{llm_model}.json"

  generate_plots: true

  plot_format: "svg"                
  plot_dpi: 300


optimization:
  vllm_gpu_memory_utilization: 0.62
  vllm_enforce_eager: false           # 设置true可禁用CUDA graph


  retrieval_parallel_queries: false   


  prefetch_corpus: false              


debug:
  verbose: true

  print_interval: 10

  save_intermediate: false

  test_mode: false
  test_sample_size: 100
  test_batch_sizes: [1, 2, 4, 8, 16]


system:

  gpu_id: "0,4"

  num_workers: 16

  mixed_precision: "fp16"

  torch_compile: false
